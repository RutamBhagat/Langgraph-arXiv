name: skyclad_langgraph

services:
  postgres:
    image: postgres
    container_name: skyclad_langgraph-postgres
    environment:
      POSTGRES_DB: skyclad_langgraph
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - skyclad_langgraph_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  skyclad_langgraph_postgres_data:
